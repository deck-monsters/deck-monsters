[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @deck-monsters/engine build && pnpm --filter @deck-monsters/web build"
watchPatterns = ["apps/web/**", "packages/engine/**"]

[deploy]
startCommand = "pnpm --filter @deck-monsters/web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
