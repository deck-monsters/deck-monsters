[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @deck-monsters/engine build && pnpm --filter @deck-monsters/web-legacy build"
watchPatterns = ["apps/web-legacy/**", "packages/engine/**"]

[deploy]
startCommand = "pnpm --filter @deck-monsters/web-legacy start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
