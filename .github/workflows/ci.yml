name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false --ignore-scripts
      # Build engine first — server and connector-discord depend on engine/dist for type resolution
      - run: pnpm --filter @deck-monsters/engine run build
      - run: pnpm --filter @deck-monsters/engine exec tsc --noEmit
      - run: pnpm --filter @deck-monsters/server exec tsc --noEmit
      - run: pnpm --filter @deck-monsters/connector-discord exec tsc --noEmit
      # Web uses vite's bundler resolution; tsc --noEmit validates it separately
      - run: pnpm --filter @deck-monsters/web exec tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false --ignore-scripts
      # Lint the new TypeScript packages. The engine package has ~2150 pre-existing
      # any-type warnings from the legacy JS→TS migration and is linted separately
      # as part of that cleanup effort.
      - run: pnpm --filter @deck-monsters/server run lint
      - run: pnpm --filter @deck-monsters/connector-discord run lint
      - run: pnpm --filter @deck-monsters/web run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false --ignore-scripts
      # Build engine first — server and connector-discord tests import from engine/dist
      - run: pnpm --filter @deck-monsters/engine run build
      - run: pnpm run test
